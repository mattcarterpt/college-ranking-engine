<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Athletics Power Rankings</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
  h1 { color: #1a3a5c; font-size: 28px; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 20px; font-size: 15px; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
  .search-box:focus { border-color: #1a3a5c; }
  .filter-select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; outline: none; cursor: pointer; }
  .results-count { font-size: 13px; color: #999; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  th { background: #1a3a5c; color: white; padding: 12px 16px; text-align: left; font-size: 13px; cursor: pointer; }
  th:hover { background: #254f7a; }
  td { padding: 11px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f8ff; }
  .rank { font-weight: 700; color: #1a3a5c; font-size: 16px; }
  .div-rank { font-size: 12px; color: #888; }
  .score { font-weight: 700; font-size: 15px; }
  .tier-1 { background: #0d2b52; color: #c8daee; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-2 { background: #e8f0f8; color: #1a4a7a; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-3 { background: #e3f2ec; color: #1a5c3a; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-4 { background: #fdf3dc; color: #b07a1a; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-5 { background: #f0ede8; color: #5a5a5a; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .division-d1 { background: #0d2b52; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .division-d2 { background: #1a5c3a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .division-d3 { background: #b07a1a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .division-naia { background: #6a1a5c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .division-badge { background: #f0ede8; color: #3a3a3a; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .loading { text-align: center; padding: 40px; color: #666; }
  .updated { font-size: 12px; color: #999; margin-top: 20px; }
  .no-results { text-align: center; padding: 40px; color: #999; font-size: 15px; }
</style>
</head>
<body>

<h1>⚽ College Athletics Power Rankings</h1>
<p class="subtitle">Women's Soccer · All Divisions · 3-Year Weighted Power Score</p>

<div class="controls">
  <input type="text" id="search" class="search-box" placeholder="Search for a school..." oninput="filterTable()">
  <select id="division-filter" class="filter-select" onchange="filterTable()">
    <option value="">All Divisions</option>
    <option value="NCAA_D1">NCAA Division I</option>
    <option value="NCAA_D2">NCAA Division II</option>
    <option value="NCAA_D3">NCAA Division III</option>
    <option value="NAIA">NAIA</option>
  </select>
  <select id="tier-filter" class="filter-select" onchange="filterTable()">
    <option value="">All Tiers</option>
    <option value="1">Tier 1 — Elite</option>
    <option value="2">Tier 2 — National</option>
    <option value="3">Tier 3 — Strong</option>
    <option value="4">Tier 4 — Average</option>
    <option value="5">Tier 5 — Developing</option>
  </select>
</div>

<div class="results-count" id="results-count"></div>

<table id="rankings-table">
  <thead>
    <tr>
      <th onclick="sortTable('universal_rank')">Overall #</th>
      <th onclick="sortTable('name')">School</th>
      <th onclick="sortTable('division')">Division</th>
      <th onclick="sortTable('division_rank')">Div. Rank</th>
      <th onclick="sortTable('power_score')">Power Score</th>
      <th onclick="sortTable('tier')">Tier</th>
    </tr>
  </thead>
  <tbody id="rankings-body">
    <tr><td colspan="6" class="loading">Loading rankings...</td></tr>
  </tbody>
</table>

<p class="updated" id="updated-time"></p>

<script>
const SUPABASE_URL = 'https://hpabqmdayuhvloazorhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KL8is3wH1ibHSxG84lmtRg_VU0xyLjc';

const tierLabels = {
  1: 'Tier 1 — Elite',
  2: 'Tier 2 — National',
  3: 'Tier 3 — Strong',
  4: 'Tier 4 — Average',
  5: 'Tier 5 — Developing'
};

let allRows = [];
let sortKey = 'universal_rank';
let sortAsc = true;

async function loadRankings() {
  document.getElementById('rankings-body').innerHTML =
    '<tr><td colspan="6" class="loading">Loading rankings...</td></tr>';

  try {
    let allData = [];
    let from = 0;
    const pageSize = 1000;

    while (true) {
      const url = `${SUPABASE_URL}/rest/v1/power_scores?select=power_score,tier,universal_rank,division_rank,program_id,season_year,programs(schools(name,division))&season_year=eq.2025&order=power_score.desc&limit=${pageSize}&offset=${from}`;

      const response = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      const data = await response.json();
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }

    allData.sort((a, b) => b.power_score - a.power_score);
    allRows = allData;
    renderTable(allRows);
    document.getElementById('updated-time').textContent =
      'Last updated: ' + new Date().toLocaleDateString();

  } catch(err) {
    document.getElementById('rankings-body').innerHTML =
      '<tr><td colspan="6" class="loading">Error loading data. Please try again.</td></tr>';
  }
}

function getDivisionClass(division) {
  if (division === 'NCAA_D1') return 'division-d1';
  if (division === 'NCAA_D2') return 'division-d2';
  if (division === 'NCAA_D3') return 'division-d3';
  if (division === 'NAIA') return 'division-naia';
  return 'division-badge';
}

function getDivisionLabel(division) {
  if (division === 'NCAA_D1') return 'D1';
  if (division === 'NCAA_D2') return 'D2';
  if (division === 'NCAA_D3') return 'D3';
  if (division === 'NAIA') return 'NAIA';
  return division;
}

function renderTable(rows) {
  const tbody = document.getElementById('rankings-body');

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-results">No programs found matching your search.</td></tr>';
    document.getElementById('results-count').textContent = '0 programs found';
    return;
  }

  tbody.innerHTML = '';
  rows.forEach(item => {
    const school = item.programs.schools;
    const tier = item.tier;
    const divClass = getDivisionClass(school.division);
    const divLabel = getDivisionLabel(school.division);
    const row = `
      <tr>
        <td class="rank">${item.universal_rank}</td>
        <td><strong>${school.name}</strong></td>
        <td><span class="${divClass}">${divLabel}</span></td>
        <td class="div-rank">#${item.division_rank || '—'}</td>
        <td class="score">${parseFloat(item.power_score).toFixed(1)}</td>
        <td><span class="tier-${tier}">${tierLabels[tier]}</span></td>
      </tr>`;
    tbody.innerHTML += row;
  });

  document.getElementById('results-count').textContent =
    `Showing ${rows.length} of ${allRows.length} programs`;
}

function sortTable(key) {
  if (sortKey === key) {
    sortAsc = !sortAsc;
  } else {
    sortKey = key;
    sortAsc = true;
  }

  const sorted = [...allRows].sort((a, b) => {
    let aVal, bVal;
    if (key === 'name') {
      aVal = a.programs.schools.name.toLowerCase();
      bVal = b.programs.schools.name.toLowerCase();
    } else if (key === 'division') {
      aVal = a.programs.schools.division;
      bVal = b.programs.schools.division;
    } else {
      aVal = a[key] || 0;
      bVal = b[key] || 0;
    }
    if (aVal < bVal) return sortAsc ? -1 : 1;
    if (aVal > bVal) return sortAsc ? 1 : -1;
    return 0;
  });

  renderTable(sorted);
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const division = document.getElementById('division-filter').value;
  const tier = document.getElementById('tier-filter').value;

  const filtered = allRows.filter(item => {
    const school = item.programs.schools;
    const matchesSearch = !search || school.name.toLowerCase().includes(search);
    const matchesDivision = !division || school.division === division;
    const matchesTier = !tier || item.tier === parseInt(tier);
    return matchesSearch && matchesDivision && matchesTier;
  });

  renderTable(filtered);
}

loadRankings();
</script>
</body>
</html>
