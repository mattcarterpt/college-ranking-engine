<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Power Rankings | Athlete Narrative</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #111111; color: #ffffff; min-height: 100vh; }
  .header { background: #000000; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #333; }
  .header img { height: 48px; }
  .header-title { color: #999; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .hero { background: linear-gradient(135deg, #000000 0%, #222222 100%); padding: 40px 40px 30px; border-bottom: 1px solid #333; }
  .hero h1 { font-size: 32px; font-weight: 900; color: #ffffff; letter-spacing: -1px; margin-bottom: 6px; }
  .hero h1 span { background: linear-gradient(90deg, #888, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: #888; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .sport-tabs { background: #000; padding: 0 40px; display: flex; gap: 0; border-bottom: 1px solid #333; }
  .sport-tab { padding: 14px 24px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .sport-tab:hover { color: #aaa; }
  .sport-tab.active { color: #fff; border-bottom-color: #fff; }
  .controls-wrap { background: #1a1a1a; padding: 20px 40px; border-bottom: 1px solid #2a2a2a; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 220px; padding: 10px 16px; border: 1px solid #333; border-radius: 6px; font-size: 14px; outline: none; background: #2a2a2a; color: #fff; }
  .search-box::placeholder { color: #666; }
  .search-box:focus { border-color: #666; }
  .filter-select { padding: 10px 16px; border: 1px solid #333; border-radius: 6px; font-size: 13px; background: #2a2a2a; color: #fff; outline: none; cursor: pointer; }
  .results-count { color: #555; font-size: 12px; padding: 10px 40px 0; letter-spacing: 1px; }
  .table-wrap { padding: 20px 40px 40px; }
  table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
  th { background: #000; color: #888; padding: 12px 16px; text-align: left; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid #333; }
  th:hover { color: #fff; }
  td { padding: 12px 16px; border-bottom: 1px solid #222; font-size: 14px; color: #ddd; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #222; }
  .rank { font-weight: 900; color: #fff; font-size: 18px; }
  .school-name { font-weight: 700; color: #fff; }
  .div-rank { font-size: 12px; color: #555; }
  .score { font-weight: 700; font-size: 15px; color: #fff; }
  .division-fbs { background: #1a6b3c; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .division-fcs { background: #2e86ab; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .division-d1 { background: #1a6b3c; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .division-d2 { background: #2e86ab; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .division-d3 { background: #8b4513; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .division-naia { background: #6b2fa0; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .tier-1 { background: #fff; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-2 { background: #444; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tier-3 { background: #2a2a2a; color: #aaa; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid #444; }
  .tier-4 { background: #1a1a1a; color: #666; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid #333; }
  .tier-5 { background: #111; color: #444; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid #222; }
  .has-tooltip { position: relative; display: inline-block; cursor: help; }
  .has-tooltip .tooltip { display: none; position: absolute; right: 100%; top: 50%; transform: translateY(-50%); background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 400; white-space: nowrap; z-index: 999; margin-right: 8px; pointer-events: none; }
  .has-tooltip:hover .tooltip { display: block; }
  .coach-grade { position: relative; font-weight: 900; font-size: 15px; cursor: help; display: inline-block; }
  .grade-a { color: #4caf50; }
  .grade-b { color: #8bc34a; }
  .grade-c { color: #ffc107; }
  .grade-d { color: #ff9800; }
  .grade-f { color: #f44336; }
  .grade-none { color: #444; font-size: 12px; }
  .coach-tooltip { display: none; position: absolute; right: 100%; top: 50%; transform: translateY(-50%); background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 400; white-space: nowrap; z-index: 999; margin-right: 8px; pointer-events: none; }
  .coach-grade:hover .coach-tooltip { display: block; }
  .roster-cell { font-weight: 700; font-size: 13px; cursor: help; display: inline-block; position: relative; }
  .roster-open { color: #4caf50; }
  .roster-low { color: #ffc107; }
  .roster-none { color: #444; font-size: 12px; }
  .loading { text-align: center; padding: 60px; color: #444; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
  .no-results { text-align: center; padding: 60px; color: #444; font-size: 14px; }
  .footer { text-align: center; padding: 30px; color: #333; font-size: 12px; letter-spacing: 1px; border-top: 1px solid #222; }
</style>
</head>
<body>

<div class="header">
  <img src="AN_Logo.png" alt="Athlete Narrative">
  <span class="header-title">Power Rankings Engine</span>
</div>

<div class="hero">
  <h1 id="hero-title">Women's Soccer <span>Power Rankings</span></h1>
  <p id="hero-subtitle">All Divisions &nbsp;·&nbsp; 3-Year Weighted Score &nbsp;·&nbsp; 2025 Season</p>
</div>

<div class="sport-tabs">
  <div class="sport-tab active" onclick="switchSport('womens-soccer', this)">⚽ Women's Soccer</div>
  <div class="sport-tab" onclick="switchSport('mens-soccer', this)">⚽ Men's Soccer</div>
  <div class="sport-tab" onclick="switchSport('football', this)">🏈 Football</div>
</div>

<div class="controls-wrap">
  <div class="controls">
    <input type="text" id="search" class="search-box" placeholder="Search for a school..." oninput="filterTable()">
    <select id="division-filter" class="filter-select" onchange="filterTable()">
      <option value="">All Divisions</option>
    </select>
    <select id="tier-filter" class="filter-select" onchange="filterTable()">
      <option value="">All Tiers</option>
      <option value="1">Tier 1 — Elite</option>
      <option value="2">Tier 2 — National</option>
      <option value="3">Tier 3 — Strong</option>
      <option value="4">Tier 4 — Average</option>
      <option value="5">Tier 5 — Developing</option>
    </select>
  </div>
</div>

<div class="results-count" id="results-count"></div>

<div class="table-wrap">
  <table id="rankings-table">
    <thead>
      <tr>
        <th onclick="sortTable('universal_rank')"># Rank</th>
        <th onclick="sortTable('name')">School</th>
        <th onclick="sortTable('division')">Division</th>
        <th onclick="sortTable('division_rank')">Div. Rank</th>
        <th onclick="sortTable('power_score')">Power Score</th>
        <th onclick="sortTable('tier')">Tier</th>
        <th onclick="sortTable('coach_quality_score')">Coach</th>
        <th onclick="sortTable('open_spots')">Roster</th>
      </tr>
    </thead>
    <tbody id="rankings-body">
      <tr><td colspan="8" class="loading">Loading Rankings...</td></tr>
    </tbody>
  </table>
</div>

<div class="footer">
  © 2025 Athlete Narrative · College Athletics Power Rankings
</div>

<script>
const SUPABASE_URL = 'https://hpabqmdayuhvloazorhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KL8is3wH1ibHSxG84lmtRg_VU0xyLjc';

const tierLabels = { 1: 'Tier 1 — Elite', 2: 'Tier 2 — National', 3: 'Tier 3 — Strong', 4: 'Tier 4 — Average', 5: 'Tier 5 — Developing' };

const tierTooltips = {
  1: 'Elite — among the best programs in the country across all tracked seasons',
  2: 'National — consistent top-level performers with strong multi-year records',
  3: 'Strong — above average programs with competitive win rates',
  4: 'Average — mid-level programs typical of their division',
  5: 'Developing — programs with below average win rates over the tracked period',
};

function getPowerScoreTooltip(score, division) {
  const divLabel = division.replace('NCAA_', '').replace('_', ' ');
  return `3-year weighted score across ${divLabel} programs · higher scores reflect better win rates, strength of schedule, and postseason success`;
}

function getGradeTooltips(division) {
  const divLabel = division.replace('NCAA_', '').replace('_', ' ');
  return {
    'A': `Elite coach — top 20% of all ${divLabel} programs by win rate and postseason success`,
    'B': `Strong coach — above average win rate among ${divLabel} programs`,
    'C': `Average coach — win rate in line with typical ${divLabel} programs`,
    'D': `Below average coach — win rate below most ${divLabel} programs`,
    'F': `Struggling coach — win rate in bottom 20% of all ${divLabel} programs`,
  };
}

const trendTooltips = {
  '↑': 'Trending up — program has improved over the last 3 seasons',
  '↓': 'Trending down — program has declined over the last 3 seasons',
  '→': 'Holding steady — performance has been consistent over the last 3 seasons',
};

const sportConfig = {
  'womens-soccer': {
    title: "Women's Soccer",
    subtitle: "All Divisions &nbsp;·&nbsp; 3-Year Weighted Score &nbsp;·&nbsp; 2025 Season",
    divisions: ['NCAA_D1', 'NCAA_D2', 'NCAA_D3', 'NAIA'],
    divisionLabels: { 'NCAA_D1': 'D1', 'NCAA_D2': 'D2', 'NCAA_D3': 'D3', 'NAIA': 'NAIA' },
    divisionClasses: { 'NCAA_D1': 'division-d1', 'NCAA_D2': 'division-d2', 'NCAA_D3': 'division-d3', 'NAIA': 'division-naia' },
    filterOptions: [
      { value: 'NCAA_D1', label: 'NCAA Division I' },
      { value: 'NCAA_D2', label: 'NCAA Division II' },
      { value: 'NCAA_D3', label: 'NCAA Division III' },
      { value: 'NAIA', label: 'NAIA' }
    ]
  },
  'mens-soccer': {
    title: "Men's Soccer",
    subtitle: "All Divisions &nbsp;·&nbsp; 3-Year Weighted Score &nbsp;·&nbsp; 2025 Season",
    divisions: ['NCAA_D1', 'NCAA_D2', 'NCAA_D3', 'NAIA'],
    divisionLabels: { 'NCAA_D1': 'D1', 'NCAA_D2': 'D2', 'NCAA_D3': 'D3', 'NAIA': 'NAIA' },
    divisionClasses: { 'NCAA_D1': 'division-d1', 'NCAA_D2': 'division-d2', 'NCAA_D3': 'division-d3', 'NAIA': 'division-naia' },
    filterOptions: [
      { value: 'NCAA_D1', label: 'NCAA Division I' },
      { value: 'NCAA_D2', label: 'NCAA Division II' },
      { value: 'NCAA_D3', label: 'NCAA Division III' },
      { value: 'NAIA', label: 'NAIA' }
    ]
  },
  'football': {
    title: 'Football',
    subtitle: "FBS &nbsp;·&nbsp; FCS &nbsp;·&nbsp; D2 &nbsp;·&nbsp; D3 &nbsp;·&nbsp; NAIA &nbsp;·&nbsp; 3-Year Weighted Score &nbsp;·&nbsp; 2025 Season",
    divisions: ['NCAA_FBS', 'NCAA_FCS', 'NCAA_D2', 'NCAA_D3', 'NAIA'],
    divisionLabels: { 'NCAA_FBS': 'FBS', 'NCAA_FCS': 'FCS', 'NCAA_D2': 'D2', 'NCAA_D3': 'D3', 'NAIA': 'NAIA' },
    divisionClasses: { 'NCAA_FBS': 'division-fbs', 'NCAA_FCS': 'division-fcs', 'NCAA_D2': 'division-d2', 'NCAA_D3': 'division-d3', 'NAIA': 'division-naia' },
    filterOptions: [
      { value: 'NCAA_FBS', label: 'FBS' },
      { value: 'NCAA_FCS', label: 'FCS' },
      { value: 'NCAA_D2', label: 'NCAA Division II' },
      { value: 'NCAA_D3', label: 'NCAA Division III' },
      { value: 'NAIA', label: 'NAIA' }
    ]
  }
};

let allRows = [];
let currentSport = 'womens-soccer';
let sortKey = 'universal_rank';
let sortAsc = true;

function switchSport(sport, tab) {
  currentSport = sport;
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('hero-title').innerHTML = sportConfig[sport].title + ' <span>Power Rankings</span>';
  document.getElementById('hero-subtitle').innerHTML = sportConfig[sport].subtitle;
  updateDivisionFilter();
  document.getElementById('search').value = '';
  document.getElementById('tier-filter').value = '';
  document.getElementById('division-filter').value = '';
  loadRankings();
}

function updateDivisionFilter() {
  const select = document.getElementById('division-filter');
  select.innerHTML = '<option value="">All Divisions</option>';
  sportConfig[currentSport].filterOptions.forEach(opt => {
    select.innerHTML += `<option value="${opt.value}">${opt.label}</option>`;
  });
}

async function loadRankings() {
  document.getElementById('rankings-body').innerHTML =
    '<tr><td colspan="8" class="loading">Loading Rankings...</td></tr>';

  try {
    const config = sportConfig[currentSport];
    let allData = [];
    let from = 0;
    const pageSize = 1000;

    while (true) {
      const url = `${SUPABASE_URL}/rest/v1/power_scores?select=power_score,tier,division_rank,program_id,season_year,sport_slug,coach_quality_score,coach_grade_display,roster_size,seniors_leaving,open_spots,senior_positions,programs(schools(name,division))&season_year=eq.2025&sport_slug=eq.${currentSport}&order=power_score.desc&limit=${pageSize}&offset=${from}`;

      const response = await fetch(url, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await response.json();
      if (!data || data.length === 0) break;

      const filtered = data.filter(item =>
        item.programs &&
        item.programs.schools &&
        config.divisions.includes(item.programs.schools.division)
      );

      allData = allData.concat(filtered);
      if (data.length < pageSize) break;
      from += pageSize;
    }

    allData.sort((a, b) => b.power_score - a.power_score);
    allData.forEach((item, index) => { item.universal_rank = index + 1; });
    allRows = allData;
    renderTable(allRows);
    document.getElementById('results-count').textContent = `Showing ${allRows.length} programs`;

  } catch(err) {
    console.error(err);
    document.getElementById('rankings-body').innerHTML =
      '<tr><td colspan="8" class="loading">Error loading data.</td></tr>';
  }
}

function getDivisionClass(division) {
  return sportConfig[currentSport].divisionClasses[division] || 'division-naia';
}

function getDivisionLabel(division) {
  return sportConfig[currentSport].divisionLabels[division] || division;
}

function getRosterHtml(item) {
  const size = item.roster_size;
  const seniors = item.seniors_leaving;
  const positions = item.senior_positions;

  if (!size) return '<span class="roster-none">—</span>';

  const spotsClass = seniors >= 5 ? 'roster-open' : 'roster-low';

  let posStr = '';
  if (positions && Object.keys(positions).length > 0) {
    posStr = ' · Positions opening: ' + Object.entries(positions)
      .sort((a, b) => b[1] - a[1])
      .map(([pos, count]) => `${count} ${pos}`)
      .join(', ');
  }

  const tooltip = `Roster: ${size}/28 · ${seniors} seniors graduating${posStr}`;

  return `<span class="has-tooltip roster-cell ${spotsClass}">${seniors} spots<span class="tooltip">${tooltip}</span></span>`;
}

function renderTable(rows) {
  const tbody = document.getElementById('rankings-body');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-results">No programs found.</td></tr>';
    document.getElementById('results-count').textContent = '0 programs found';
    return;
  }
  tbody.innerHTML = '';
  rows.forEach(item => {
    const school = item.programs.schools;
    const tier = item.tier;
    const divClass = getDivisionClass(school.division);
    const divLabel = getDivisionLabel(school.division);

    const powerTooltip = getPowerScoreTooltip(item.power_score, school.division);
    const powerHtml = `<span class="has-tooltip score">${parseFloat(item.power_score).toFixed(1)}<span class="tooltip">${powerTooltip}</span></span>`;

    const tierTooltip = tierTooltips[tier] || '';
    const tierHtml = `<span class="has-tooltip tier-${tier}">${tierLabels[tier]}<span class="tooltip">${tierTooltip}</span></span>`;

    const display = item.coach_grade_display;
    const gradeKey = display ? display[0] : null;
    const trendKey = display ? display[1] : null;
    const gradeTooltips = getGradeTooltips(school.division);
    const gradeText = gradeTooltips[gradeKey] || '';
    const trendText = trendTooltips[trendKey] || '';
    const tooltip = gradeKey ? `${gradeText}${trendText ? ' · ' + trendText : ''}` : '';
    const gradeHtml = display
      ? `<span class="coach-grade grade-${gradeKey.toLowerCase()}">${display}<span class="coach-tooltip">${tooltip}</span></span>`
      : `<span class="grade-none">—</span>`;

    const rosterHtml = getRosterHtml(item);

    tbody.innerHTML += `
      <tr>
        <td class="rank">${item.universal_rank}</td>
        <td class="school-name">${school.name}</td>
        <td><span class="${divClass}">${divLabel}</span></td>
        <td class="div-rank">#${item.division_rank || '—'}</td>
        <td>${powerHtml}</td>
        <td>${tierHtml}</td>
        <td>${gradeHtml}</td>
        <td>${rosterHtml}</td>
      </tr>`;
  });
  document.getElementById('results-count').textContent =
    `Showing ${rows.length} of ${allRows.length} programs`;
}

function sortTable(key) {
  if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = true; }
  const sorted = [...allRows].sort((a, b) => {
    let aVal, bVal;
    if (key === 'name') { aVal = a.programs.schools.name.toLowerCase(); bVal = b.programs.schools.name.toLowerCase(); }
    else if (key === 'division') { aVal = a.programs.schools.division; bVal = b.programs.schools.division; }
    else { aVal = a[key] || 0; bVal = b[key] || 0; }
    if (aVal < bVal) return sortAsc ? -1 : 1;
    if (aVal > bVal) return sortAsc ? 1 : -1;
    return 0;
  });
  renderTable(sorted);
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const division = document.getElementById('division-filter').value;
  const tier = document.getElementById('tier-filter').value;
  const filtered = allRows.filter(item => {
    const school = item.programs.schools;
    const matchesSearch = !search || school.name.toLowerCase().includes(search);
    const matchesDivision = !division || school.division === division;
    const matchesTier = !tier || item.tier === parseInt(tier);
    return matchesSearch && matchesDivision && matchesTier;
  });
  renderTable(filtered);
}

updateDivisionFilter();
loadRankings();
</script>
</body>
</html>
